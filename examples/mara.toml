schema_version = "1"

[server]
metrics_addr = "127.0.0.1:9099"
log_format = "json"

# Tier A: OTLP HTTP/protobuf receiver for runtimes that emit OTel
# (Claude Code, Codex, Gemini CLI).  Set these env vars on the
# runtime to point it at Mara:
#   CLAUDE_CODE_ENABLE_TELEMETRY=1
#   OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318
[[adapters.otlp]]
name = "claude_code_otlp"
http_listen = "127.0.0.1:4318"

# Tier B: JSONL tail of Claude Code transcripts as redundant signal
# for ZDR-strict environments where OTel is disabled.
[[adapters.jsonl]]
name = "claude_code_jsonl"
globs = ["~/.claude/projects/**/*.jsonl"]
checkpoint_path = ".mara/ckpt/claude_code"

# Tier C (MVP): HTTP reverse proxy in front of Ollama. Point your client
# at http://127.0.0.1:11435 instead of :11434 so Mara captures completions.
[[adapters.llm_proxy]]
name = "ollama_proxy"
http_listen = "127.0.0.1:11435"
upstream = "http://127.0.0.1:11434"
normalizer = "ollama"
max_body_bytes = 10485760

[[sinks.stdout]]
name = "demo_stdout"
pretty = true

[[sinks.file]]
name = "demo_file"
path = "out/mara-events.jsonl"
format = "jsonl"
rotate_bytes = 67108864

# Optional: forward canonical events to another OTLP/HTTP endpoint
# (OpenTelemetry Collector, Grafana Alloy, Jaeger with OTLP, etc.).
# [[sinks.otlp]]
# name = "forward_otlp"
# http_endpoint = "http://127.0.0.1:4319"
# batch_max_events = 64
# timeout_secs = 30
# gzip = false

[[policies.demo_chain]]
type = "redact"
pack = "builtin.pii"

[[pipelines]]
name = "demo"
adapters = ["claude_code_otlp", "claude_code_jsonl"]
policy_chain = "demo_chain"
sinks = ["demo_stdout", "demo_file"]

[[pipelines]]
name = "ollama"
adapters = ["ollama_proxy"]
policy_chain = "demo_chain"
sinks = ["demo_stdout", "demo_file"]
